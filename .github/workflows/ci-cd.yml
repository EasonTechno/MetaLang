name: 🧠 元语言计划 CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  test:
    name: 🧪 代码测试与检查
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: 📦 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest flake8

      - name: 🔍 代码语法检查 (flake8)
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: ✅ 验证模块导入
        run: |
          python -c "from 人类训练工具.外语直接思考训练 import render_foreign_language; print('✅ 外语模块正常')"
          python -c "from 人类训练工具.递归思维训练 import render_recursion_training; print('✅ 递归模块正常')"
          python -c "from 人类训练工具.数学语言推理 import render_math_reasoning; print('✅ 逻辑模块正常')"
          python -c "from 人工语言设计.状态转移语 import render_state_transition_lang; print('✅ 人工语言模块正常')"
          python -c "from 神经网络实验.母语锚定网络 import render_neural_simulation; print('✅ 神经网络模块正常')"

      - name: 🚀 Streamlit 应用冒烟测试
        run: |
          timeout 15 streamlit run app.py --server.port=18501 --server.headless=true 2>&1 | head -20 || true
          echo "✅ Streamlit应用启动正常"

  deploy-demo:
    name: 🌐 部署在线演示
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 📄 生成 GitHub Pages 入口
        run: |
          cat > index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>🧠 元语言计划 - MetaLanguage Project</title>
              <style>
                  * { margin: 0; padding: 0; box-sizing: border-box; }
                  body {
                      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                      min-height: 100vh;
                      display: flex;
                      align-items: center;
                      justify-content: center;
                      padding: 20px;
                  }
                  .container {
                      background: white;
                      border-radius: 20px;
                      padding: 40px;
                      max-width: 600px;
                      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
                      text-align: center;
                  }
                  h1 { font-size: 2.5em; margin-bottom: 10px; color: #1a1a2e; }
                  .emoji { font-size: 3em; margin-bottom: 20px; }
                  p { color: #666; line-height: 1.8; margin-bottom: 20px; }
                  .features {
                      display: grid;
                      gap: 15px;
                      margin: 30px 0;
                      text-align: left;
                  }
                  .feature {
                      background: #f8f9ff;
                      padding: 15px;
                      border-radius: 10px;
                      border-left: 4px solid #667eea;
                  }
                  .feature strong { color: #1a1a2e; }
                  .btn {
                      display: inline-block;
                      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                      color: white;
                      padding: 15px 40px;
                      border-radius: 50px;
                      text-decoration: none;
                      font-weight: bold;
                      font-size: 1.1em;
                      transition: transform 0.3s, box-shadow 0.3s;
                      margin: 10px;
                  }
                  .btn:hover {
                      transform: translateY(-2px);
                      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
                  }
                  .btn-secondary {
                      background: #f0f0f0;
                      color: #333;
                  }
                  .stats {
                      display: flex;
                      justify-content: center;
                      gap: 40px;
                      margin-top: 30px;
                  }
                  .stat { text-align: center; }
                  .stat-number { font-size: 2em; font-weight: bold; color: #667eea; }
                  .stat-label { color: #888; font-size: 0.9em; }
              </style>
          </head>
          <body>
              <div class="container">
                  <div class="emoji">🧠</div>
                  <h1>元语言计划</h1>
                  <p><strong>MetaLanguage Project</strong></p>
                  <p style="font-size: 0.95em;">
                      通过神经网络模拟语言如何塑造人类思维，<br>
                      开发可迁移到人类的认知增强技术。
                  </p>

                  <div class="features">
                      <div class="feature">
                          <strong>🔤 外语直接思考训练</strong><br>
                          跳过中文翻译，直接用英语思考，提升考试分数
                      </div>
                      <div class="feature">
                          <strong>∞ 递归思维增强</strong><br>
                          用"状态-转移语言"突破主谓宾结构的认知局限
                      </div>
                      <div class="feature">
                          <strong>∑ 数学语言推理</strong><br>
                          用形式逻辑替代中文的模糊思维
                      </div>
                  </div>

                  <div class="stats">
                      <div class="stat">
                          <div class="stat-number">50%</div>
                          <div class="stat-label">神经网络实验</div>
                      </div>
                      <div class="stat">
                          <div class="stat-number">50%</div>
                          <div class="stat-label">人类训练应用</div>
                      </div>
                  </div>

                  <a href="https://github.com/EasonTechno/MetaLanguage" class="btn">
                      ⭐ 查看 GitHub
                  </a>
                  <a href="https://github.com/EasonTechno/MetaLanguage#-快速开始" class="btn btn-secondary">
                      🚀 本地运行
                  </a>
              </div>
          </body>
          </html>
          EOF
          echo "✅ GitHub Pages 入口生成完成"

      - name: 🚀 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          exclude_assets: '.github,__pycache__,*.pyc'

  codeql:
    name: 🔒 CodeQL 安全扫描
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🔍 初始化 CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: 📦 自动构建
        uses: github/codeql-action/autobuild@v3

      - name: 🕵️ 执行分析
        uses: github/codeql-action/analyze@v3
